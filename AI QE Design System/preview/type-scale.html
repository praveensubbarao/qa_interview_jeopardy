<!doctype html>
<html><head><meta charset="utf-8"><title>Type scale</title>
<link rel="stylesheet" href="_card.css">
<style>
.scale { display: grid; grid-template-columns: 96px 1fr 80px; gap: 12px; align-items: baseline; padding: 4px 0; border-top: 1px solid var(--border); }
.scale:first-of-type { border-top: 0; }
.scale .tok { font-family: var(--font-mono); font-size: 11px; color: var(--green-700); }
.scale .demo { font-family: var(--font-display); color: var(--fg); }
.scale .meta { font-family: var(--font-mono); font-size: 10px; color: var(--fg-3); text-align: right; }
</style></head>
<body>
<div class="card">
  <div class="col"><div class="eyebrow">Type scale</div></div>
  <div class="scale"><div class="tok">display-xl</div><div class="demo" style="font-size:42px; font-weight:700; line-height:1">Aa</div><div class="meta">72 / 700 / 1.0</div></div>
  <div class="scale"><div class="tok">h1</div><div class="demo" style="font-size:30px; font-weight:700; line-height:1.1">Aa</div><div class="meta">48 / 700 / 1.1</div></div>
  <div class="scale"><div class="tok">h3</div><div class="demo" style="font-size:22px; font-weight:600; line-height:1.2">Aa</div><div class="meta">32 / 600 / 1.2</div></div>
  <div class="scale"><div class="tok">h5</div><div class="demo" style="font-size:18px; font-weight:600; line-height:1.3">Aa</div><div class="meta">20 / 600 / 1.3</div></div>
  <div class="scale"><div class="tok">body-m</div><div class="demo" style="font-size:16px; font-weight:400; line-height:1.6; font-family:var(--font-body)">Aa</div><div class="meta">16 / 400 / 1.6</div></div>
  <div class="scale"><div class="tok">caption</div><div class="demo" style="font-size:12px; font-weight:500; font-family:var(--font-body); color:var(--fg-3)">Aa</div><div class="meta">12 / 500 / 1.4</div></div>
</div>
</body></html>
