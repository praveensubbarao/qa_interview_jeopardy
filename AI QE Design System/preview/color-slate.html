<!doctype html>
<html><head><meta charset="utf-8"><title>Color · Slate neutrals</title>
<link rel="stylesheet" href="_card.css">
<style>
.scale { display: grid; grid-template-columns: repeat(10, 1fr); gap: 0; border-radius: 12px; overflow: hidden; border: 1px solid var(--border); }
.swatch { aspect-ratio: 1 / 1.1; display: flex; flex-direction: column; justify-content: flex-end; padding: 8px 6px; color: #fff; }
.swatch.lo { color: var(--slate-900); }
.swatch .num { font-family: var(--font-mono); font-size: 10px; font-weight: 500; }
.swatch .hex { font-family: var(--font-mono); font-size: 9px; opacity: 0.7; margin-top: 2px; }
</style></head>
<body>
<div class="card">
  <div class="col"><div class="eyebrow">Slate · neutrals</div></div>
  <div class="scale">
    <div class="swatch" style="background:#101311"><div class="num">950</div><div class="hex">#101311</div></div>
    <div class="swatch" style="background:#171A18"><div class="num">900</div><div class="hex">#171A18</div></div>
    <div class="swatch" style="background:#232825"><div class="num">800</div><div class="hex">#232825</div></div>
    <div class="swatch" style="background:#3D433F"><div class="num">700</div><div class="hex">#3D433F</div></div>
    <div class="swatch" style="background:#5D665F"><div class="num">600</div><div class="hex">#5D665F</div></div>
    <div class="swatch" style="background:#7A857C"><div class="num">500</div><div class="hex">#7A857C</div></div>
    <div class="swatch lo" style="background:#C5CCC6"><div class="num">300</div><div class="hex">#C5CCC6</div></div>
    <div class="swatch lo" style="background:#DFE5E0"><div class="num">200</div><div class="hex">#DFE5E0</div></div>
    <div class="swatch lo" style="background:#F3F5F3"><div class="num">100</div><div class="hex">#F3F5F3</div></div>
    <div class="swatch lo" style="background:#FFFFFF"><div class="num">0</div><div class="hex">#FFFFFF</div></div>
  </div>
</div>
</body></html>
