<!doctype html>
<html><head><meta charset="utf-8"><title>Color · Botanical Gold</title>
<link rel="stylesheet" href="_card.css">
<style>
.scale { display: grid; grid-template-columns: repeat(5, 1fr); gap: 0; border-radius: 12px; overflow: hidden; }
.swatch { aspect-ratio: 1 / 1.05; display: flex; flex-direction: column; justify-content: flex-end; padding: 10px 8px; color: #fff; }
.swatch.lo { color: var(--slate-900); }
.swatch .num { font-family: var(--font-mono); font-size: 11px; font-weight: 500; }
.swatch .hex { font-family: var(--font-mono); font-size: 10px; opacity: 0.7; margin-top: 2px; }
</style></head>
<body>
<div class="card">
  <div class="col"><div class="eyebrow">Botanical Gold · accent</div></div>
  <div class="scale">
    <div class="swatch" style="background:#8C6A0B"><div class="num">900</div><div class="hex">#8C6A0B</div></div>
    <div class="swatch" style="background:#B98B12"><div class="num">700</div><div class="hex">#B98B12</div></div>
    <div class="swatch lo" style="background:#D9B548"><div class="num">500</div><div class="hex">#D9B548</div></div>
    <div class="swatch lo" style="background:#E8D37A"><div class="num">300</div><div class="hex">#E8D37A</div></div>
    <div class="swatch lo" style="background:#F7F0D6"><div class="num">100</div><div class="hex">#F7F0D6</div></div>
  </div>
</div>
</body></html>
