<!doctype html>
<html><head><meta charset="utf-8"><title>Gradients</title>
<link rel="stylesheet" href="_card.css">
<style>
.grad { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; }
.tile { aspect-ratio: 1.6 / 1; border-radius: 14px; padding: 14px; display: flex; flex-direction: column; justify-content: space-between; color: #fff; position: relative; overflow: hidden; }
.tile.light { color: var(--slate-900); }
.tile .name { font-family: var(--font-display); font-size: 15px; font-weight: 600; }
.tile .desc { font-family: var(--font-mono); font-size: 10px; opacity: 0.85; }
</style></head>
<body>
<div class="card">
  <div class="col"><div class="eyebrow">Gradient system</div></div>
  <div class="grad">
    <div class="tile" style="background: linear-gradient(135deg,#014D36 0%,#16945A 45%,#82E3A7 100%);">
      <div class="name">Intelligence</div>
      <div class="desc">linear · 135° · primary</div>
    </div>
    <div class="tile light" style="background: radial-gradient(circle, rgba(77,204,130,0.32) 0%, rgba(22,148,90,0.16) 45%, rgba(255,255,255,1) 100%); border: 1px solid var(--border);">
      <div class="name">Nature glow</div>
      <div class="desc">radial · ambient backdrop</div>
    </div>
    <div class="tile light" style="background: linear-gradient(90deg,#B98B12 0%,#E8D37A 100%);">
      <div class="name">Premium gold</div>
      <div class="desc">linear · 90° · accent</div>
    </div>
  </div>
</div>
</body></html>
