<!doctype html>
<html><head><meta charset="utf-8"><title>Semantic colors</title>
<link rel="stylesheet" href="_card.css">
<style>
.row4 { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; }
.semantic { padding: 16px; border-radius: 12px; display: flex; flex-direction: column; gap: 8px; border: 1px solid var(--border); }
.dot { width: 24px; height: 24px; border-radius: 999px; }
.name { font-family: var(--font-display); font-size: 14px; font-weight: 600; color: var(--fg); }
.hex { font-family: var(--font-mono); font-size: 11px; color: var(--fg-3); }
.use { font-size: 11px; color: var(--fg-2); }
</style></head>
<body>
<div class="card">
  <div class="col"><div class="eyebrow">Semantic colors</div></div>
  <div class="row4">
    <div class="semantic" style="background: rgba(22,163,74,0.06)">
      <div class="dot" style="background:#16A34A"></div>
      <div class="name">Success</div><div class="hex">#16A34A</div><div class="use">Pass states, healthy runs</div>
    </div>
    <div class="semantic" style="background: rgba(217,119,6,0.06)">
      <div class="dot" style="background:#D97706"></div>
      <div class="name">Warning</div><div class="hex">#D97706</div><div class="use">Flaky tests, attention needed</div>
    </div>
    <div class="semantic" style="background: rgba(220,38,38,0.06)">
      <div class="dot" style="background:#DC2626"></div>
      <div class="name">Error</div><div class="hex">#DC2626</div><div class="use">Failed runs, incidents</div>
    </div>
    <div class="semantic" style="background: rgba(2,132,199,0.06)">
      <div class="dot" style="background:#0284C7"></div>
      <div class="name">Info</div><div class="hex">#0284C7</div><div class="use">Neutral info, tips</div>
    </div>
  </div>
</div>
</body></html>
