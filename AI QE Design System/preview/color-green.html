<!doctype html>
<html><head><meta charset="utf-8"><title>Brand color · Intelligence Green</title>
<link rel="stylesheet" href="_card.css">
<style>
.scale { display: grid; grid-template-columns: repeat(9, 1fr); gap: 0; border-radius: 12px; overflow: hidden; }
.swatch { aspect-ratio: 1 / 1.1; display: flex; flex-direction: column; justify-content: flex-end; padding: 10px 8px; color: #fff; }
.swatch.lo { color: var(--slate-900); }
.swatch .num { font-family: var(--font-mono); font-size: 11px; font-weight: 500; letter-spacing: 0.04em; opacity: 0.85; }
.swatch .hex { font-family: var(--font-mono); font-size: 10px; font-weight: 500; opacity: 0.7; margin-top: 2px; }
</style></head>
<body>
<div class="card">
  <div class="col">
    <div class="eyebrow">Intelligence Green · primary</div>
  </div>
  <div class="scale">
    <div class="swatch" style="background:#014D36"><div class="num">900</div><div class="hex">#014D36</div></div>
    <div class="swatch" style="background:#046B46"><div class="num">800</div><div class="hex">#046B46</div></div>
    <div class="swatch" style="background:#0B7A4B"><div class="num">700</div><div class="hex">#0B7A4B</div></div>
    <div class="swatch" style="background:#16945A"><div class="num">600</div><div class="hex">#16945A</div></div>
    <div class="swatch" style="background:#26B36A"><div class="num">500</div><div class="hex">#26B36A</div></div>
    <div class="swatch lo" style="background:#4DCC82"><div class="num">400</div><div class="hex">#4DCC82</div></div>
    <div class="swatch lo" style="background:#82E3A7"><div class="num">300</div><div class="hex">#82E3A7</div></div>
    <div class="swatch lo" style="background:#C6F3D6"><div class="num">200</div><div class="hex">#C6F3D6</div></div>
    <div class="swatch lo" style="background:#E9FAEF"><div class="num">100</div><div class="hex">#E9FAEF</div></div>
  </div>
</div>
</body></html>
