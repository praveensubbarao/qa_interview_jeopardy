<!doctype html>
<html><head><meta charset="utf-8"><title>Buttons</title>
<link rel="stylesheet" href="_card.css">
<style>
.btnrow { display: flex; gap: 12px; align-items: center; flex-wrap: wrap; }
.btn { font-family: var(--font-body); font-weight: 600; font-size: 14px; padding: 12px 22px; border-radius: 14px; border: 1px solid transparent; cursor: pointer; transition: all 180ms cubic-bezier(0.22,1,0.36,1); display: inline-flex; align-items: center; gap: 8px; }
.btn.primary { background: var(--green-600); color: #fff; box-shadow: 0 6px 16px rgba(1,77,54,0.18); }
.btn.primary:hover { background: var(--green-700); transform: translateY(-2px); box-shadow: 0 12px 24px rgba(1,77,54,0.22); }
.btn.secondary { background: #fff; color: var(--green-800); border-color: var(--green-300); }
.btn.secondary:hover { background: var(--green-100); border-color: var(--green-500); }
.btn.ghost { background: transparent; color: var(--fg); }
.btn.ghost:hover { background: var(--slate-100); }
.btn.dark { background: var(--slate-900); color: #fff; }
.btn.gold { background: var(--gold-500); color: var(--slate-900); }
.btn .arrow { display: inline-block; transition: transform 180ms; }
.btn:hover .arrow { transform: translateX(2px); }
.btn.sm { padding: 8px 14px; font-size: 13px; border-radius: 10px; }
.btn.lg { padding: 16px 28px; font-size: 16px; border-radius: 16px; }
</style></head>
<body>
<div class="card">
  <div class="col"><div class="eyebrow">Buttons</div></div>
  <div class="btnrow">
    <button class="btn primary">Run analysis <span class="arrow">→</span></button>
    <button class="btn secondary">Connect repo</button>
    <button class="btn ghost">View runs</button>
    <button class="btn dark">Get started</button>
    <button class="btn gold">Upgrade</button>
  </div>
  <div class="btnrow">
    <button class="btn primary sm">Save</button>
    <button class="btn secondary sm">Cancel</button>
    <button class="btn primary lg">Start free trial <span class="arrow">→</span></button>
  </div>
</div>
</body></html>
