<!doctype html>
<html><head><meta charset="utf-8"><title>Radii</title>
<link rel="stylesheet" href="_card.css">
<style>
.grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 14px; }
.box { aspect-ratio: 1.4 / 1; background: var(--green-100); border: 1px solid var(--green-300); display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 4px; }
.box .tok { font-family: var(--font-mono); font-size: 11px; color: var(--green-800); font-weight: 600; }
.box .v { font-family: var(--font-mono); font-size: 10px; color: var(--green-700); }
</style></head>
<body>
<div class="card">
  <div class="col"><div class="eyebrow">Border radius</div></div>
  <div class="grid">
    <div class="box" style="border-radius:6px"><div class="tok">sm</div><div class="v">6px</div></div>
    <div class="box" style="border-radius:12px"><div class="tok">md</div><div class="v">12px</div></div>
    <div class="box" style="border-radius:20px"><div class="tok">lg</div><div class="v">20px</div></div>
    <div class="box" style="border-radius:28px"><div class="tok">xl</div><div class="v">28px</div></div>
    <div class="box" style="border-radius:999px"><div class="tok">pill</div><div class="v">999px</div></div>
  </div>
</div>
</body></html>
